<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leonixa</title>
    <meta
      name="description"
      content="Leonixa is building intelligent work systems with clarity."
    />
    <style>
      :root {
        --bg: #0b1020;
        --bg-soft: #121933;
        --text: #f5f7ff;
        --muted: #a9b2d0;
        --line: rgba(255, 255, 255, 0.12);
        --accent: #8ba7ff;
        --accent-strong: #c9d6ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(139, 167, 255, 0.18), transparent 32%),
          radial-gradient(circle at bottom right, rgba(201, 214, 255, 0.14), transparent 28%),
          linear-gradient(180deg, #0a0f1e 0%, #0b1020 100%);
        color: var(--text);
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 20px;
      }

      .shell {
        width: 100%;
        max-width: 760px;
      }

      .card {
        background: rgba(18, 25, 51, 0.72);
        border: 1px solid var(--line);
        border-radius: 28px;
        padding: 48px 28px;
        backdrop-filter: blur(18px);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.04);
        color: var(--accent-strong);
        font-size: 14px;
        letter-spacing: 0.02em;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 20px var(--accent);
      }

      h1 {
        margin: 20px 0 12px;
        font-size: clamp(42px, 10vw, 76px);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      p.lead {
        margin: 0;
        max-width: 560px;
        color: var(--muted);
        font-size: clamp(18px, 3vw, 22px);
        line-height: 1.6;
      }

      .divider {
        width: 100%;
        height: 1px;
        background: var(--line);
        margin: 28px 0;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .item {
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 16px;
        background: rgba(255, 255, 255, 0.03);
      }

      .item strong {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        color: var(--accent-strong);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .item span {
        color: var(--muted);
        font-size: 15px;
        line-height: 1.6;
      }

      .footer {
        margin-top: 28px;
        color: var(--muted);
        font-size: 14px;
      }

      @media (max-width: 720px) {
        .card {
          padding: 34px 20px;
          border-radius: 22px;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <div class="badge">
          <span class="dot"></span>
          <span>Leonixa is live</span>
        </div>

        <h1>Leonixa</h1>

        <p class="lead">
          Building intelligent work systems with clarity.
        </p>

        <div class="divider"></div>

        <div class="grid">
          <div class="item">
            <strong>Brand</strong>
            <span>Leonixa is the brand and the world behind the system.</span>
          </div>
          <div class="item">
            <strong>App</strong>
            <span>Leonixi will become the workspace and operating layer.</span>
          </div>
          <div class="item">
            <strong>Guide</strong>
            <span>Leonix will evolve as the virtual guide inside the experience.</span>
          </div>
        </div>

        <p class="footer">
          A new system is taking shape.
        </p>
      </section>
    </main>
  </body>
</html>
